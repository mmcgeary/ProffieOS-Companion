# mhs4_ini profile target from ProffieOS/config/mhs4_ini.h
# NUM_BLADES=1, NUM_BUTTONS=1

[global]
volume = 1000
clash_threshold = 8
num_buttons = 1
button_profile = default
blade_dimming = 100
idle_off_time = 600000
motion_timeout = 900000
button_short_click_timeout = 500
button_double_click_timeout = 500
twist_on = false
twist_off = false
stab_on = false
swing_on = false

[preset1]
name = Kestis
font = Kestis
track = tracks/track1.wav
blade1_style = standard
blade1_base_color = blue
blade1_alt_color = cyan
blade1_blast_color = white
blade1_clash_color = white
blade1_lockup_color = white
blade1_drag_color = orange
blade1_lb_color = cyan
blade1_stab_color = white
blade1_swing_color = black
blade1_emitter_color = blue
blade1_preon_color = blue
blade1_off_color = black
blade1_off_mode = pulse
blade1_off_rate_ms = 1200
blade1_ignition_time = 300
blade1_retraction_time = 200
